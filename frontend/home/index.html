<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- for mobile -->
    <title>MovieBuddy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/MovieBuddy/frontend/chatbot/chatbot.css">
    
</head>
<body>
    <nav class="navbar">
        <h1 class="logo"><a href="/MovieBuddy/frontend/home/index.html" style="color:red; text-decoration:none;">MovieBuddy</a></h1>
        
        <div class="search-box">
            <input type="text" id="searchinput" placeholder="Search movies & shows...">
            <button id="searchbutton">Search</button>
        </div>
        
        <div class="nav-links">
            <a href="/MovieBuddy/frontend/home/index.html" id="home-link">Home</a>
            <a href="/MovieBuddy/frontend/watchlist/watchlist.html">Watchlist</a>
            <a href="/MovieBuddy/frontend/for_you/foryou.html">For You</a>
            <a href="/MovieBuddy/frontend/match/matchmaker.html">watch with friend</a>
            <a href="/MovieBuddy/frontend/movies/movies.html">Mood</a> 
            <a href="/MovieBuddy/frontend/login_page/auth.html" id="nav-auth-btn" class="sign-in-btn">Sign In</a> 
        </div>
    </nav>


    <main>
        <section class="movie-row" id="search-section" style="display: none;">
            <h2 id="search-heading">Search Results</h2>
            <div class="search-grid" id="search-results"></div>
        </section>

        <div id="home-content">
            <!-- bigScreen: -->
            <header id="hero-banner" class="hero">
                <div id="hero-video-container"></div>

                <div class="hero-content">
                    <h1 id="hero-title">Movie Title</h1>
                    <p id="hero-description">Movie description</p>
                    <div class="hero-buttons">
                        <!-- <button class="btn play-btn">▶ Play</button> -->
                        <button class="btn info-btn" id="info-button">ⓘ More Info</button>
                    </div>
                </div>

                <!-- <div class="hero-fade-bottom"></div> -->
            </header>

            <section class="movie-row">
                <h2>What's Trending</h2>
                <div class="slider-container" id="trending-slider"></div>
            </section>
        
            <section class="movie-row">
                <h2>Latest Releases</h2>
                <div class="slider-container" id="latest-slider"></div>
            </section>

            <section class="movie-row">
                <h2>Popular TV Shows</h2>
                <div class="slider-container" id="Popular-slider"></div>
            </section>

            <section class="movie-row">
                <h2>In Cinemas</h2> 
                <div class="slider-container" id="cinemas-slider"></div>
            </section>

            <section class="movie-row">
                <h2>Top Rated</h2>
                <div class="slider-container" id="top-rated-slider"></div>
            </section>
        </div>
        
        
    </main>
    <div id="moviebuddy-chat-widget">
        <div id="chat-popup" class="chat-popup hidden">
            <div class="chat-header">
                <span>MovieBuddy AI</span>
                <button id="close-chat-btn" class="close-btn">&times;</button>
            </div>
            
            <div class="chat-box" id="chat-box">
                <div class="message bot-msg">
                    Hi there! Tell me what vibe you're looking for, and I'll find the perfect movie! 🍿
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="e.g., A funny space movie..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <button id="chat-bubble-btn" class="chat-bubble-btn">
            <img src="./chatbot.jpg">
        </button>
    </div>
    <script src="/MovieBuddy/frontend/chatbot/chatbot.js"></script>
    <script src="/MovieBuddy/frontend/home/config.js"></script>
    <script src="/MovieBuddy/frontend/home/script.js"></script>
</body>
</html>
