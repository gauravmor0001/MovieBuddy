<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You | MovieBuddy</title>
    <link rel="stylesheet" href="/frontend/home/style.css"> 
    <style>
        /* A little extra styling for the For You page */
        .foryou-header {
            text-align: center;
            margin: 40px 20px 20px;
            color: white;
        }
        .foryou-subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 40px;
        }
        .loading-text {
            text-align: center;
            font-size: 1.2rem;
            color: #e50914; /* Netflix red */
            margin-top: 50px;
        }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
            padding: 20px;
            max-width: 1000px; 
            margin: 0 auto;
        }
        .movie-grid a {
        display: block;
        width: 100%;
        text-decoration: none;
    }

    .movie-grid .search-card {
        width: 100%;
        height: auto;
    }
    </style>
</head>
<body style="background-color: #121212; color: white; font-family: Arial, sans-serif;">

    <nav class="navbar">
        <h1 class="logo"><a href="/frontend/home/index.html" style="color:red; text-decoration:none;">MovieBuddy</a></h1>
        
        <div class="search-box">
            <input type="text" id="searchinput" placeholder="Search movies & shows...">
            <button id="searchbutton">Search</button>
        </div>
        
        <div class="nav-links">
            <a href="/frontend/home/index.html" id="home-link">Home</a>
            <a href="/frontend/watchlist/watchlist.html">Watchlist</a>
            <a href="/frontend/for_you/foryou.html">For You</a>
            <a href="/frontend/match/matchmaker.html">watch with friend</a>
            <a href="/frontend/movies/movies.html">Mood</a> 
            <a href="/frontend/login_page/auth.html" id="nav-auth-btn" class="sign-in-btn">Sign In</a> 
        </div>
    </nav>

    <div class="foryou-header">
        <h1>Curated For You</h1>
    </div>
    <div class="foryou-subtitle">
        <p>AI-powered recommendations based on your "Liked" playlist.</p>
    </div>

    <div id="recommendations-container" class="movie-grid">
        <p class="loading-text" id="status-message">Analyzing your Taste DNA... 🧠🍿</p>
    </div>

    <script src="foryou.js"></script>
</body>
</html>
