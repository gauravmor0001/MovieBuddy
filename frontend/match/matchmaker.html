<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchmaker | MovieBuddy</title>
    <link rel="stylesheet" href="../style.css"> <style>
        .matchmaker-hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #1e1e1e, #121212);
        }
        .matchmaker-hero h1 {
            color: #e50914;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .matchmaker-hero p {
            color: #aaa;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }
        .vibe-inputs {
            display: flex;
            justify-content: center;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .vibe-box {
            background-color: #2b2b2b;
            padding: 20px;
            border-radius: 12px;
            flex: 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .vibe-box h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 2px solid #e50914;
            padding-bottom: 10px;
            display: inline-block;
        }
        .vibe-box textarea {
            width: 100%;
            height: 120px;
            background-color: #1a1a1a;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            resize: none;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .vibe-box textarea:focus {
            outline: none;
            border-color: #e50914;
        }
        .match-btn-container {
            text-align: center;
            margin: 40px 0;
        }
        .match-btn {
            background-color: #e50914;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }
        .match-btn:hover {
            transform: scale(1.05);
            background-color: #ff0f1a;
        }
        
        /* The Results Area */
        #result-area {
            max-width: 800px;
            margin: 0 auto 50px auto;
            background-color: #1e1e1e;
            border-radius: 12px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hidden {
            display: none !important;
        }
        #result-poster {
            width: 300px;
            object-fit: cover;
        }
        .result-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .result-content h2 {
            margin-top: 0;
            color: #fff;
            font-size: 2rem;
        }
        .result-content p {
            color: #ddd;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        .loading-spinner {
            color: white;
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
    </style>
</head>
<body style="background-color: #121212; color: white; font-family: Arial, sans-serif; margin: 0;">

    <nav style="padding: 20px; background-color: #1e1e1e; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0; color: #e50914;">MovieBuddy</h2>
        <div>
            <a href="../index.html" style="color: white; text-decoration: none; margin-right: 20px;">Home</a>
            <a href="matchmaker.html" style="color: white; text-decoration: none; font-weight: bold;">Matchmaker</a>
        </div>
    </nav>

    <div class="matchmaker-hero">
        <h1>Movie Night Matchmaker</h1>
        <p>Can't agree on what to watch? Enter both of your moods below. Our AI will calculate the exact mathematical midpoint of your tastes and find the perfect compromise.</p>
    </div>

    <div class="vibe-inputs">
        <div class="vibe-box">
            <h3>Person 1</h3>
            <textarea id="vibe-a" placeholder="e.g., I want a dark, gritty detective thriller..."></textarea>
        </div>
        <div class="vibe-box">
            <h3>Person 2</h3>
            <textarea id="vibe-b" placeholder="e.g., I want something funny, lighthearted, and maybe in space..."></textarea>
        </div>
    </div>

    <div class="match-btn-container">
        <button class="match-btn" onclick="findCompromise()">Find Our Movie</button>
    </div>
