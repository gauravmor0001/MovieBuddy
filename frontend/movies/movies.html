<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies | MovieBuddy</title>
    <link rel="stylesheet" href="/frontend/home/style.css">
    <style>
        .page-header {
            text-align: center;
            margin: 40px 20px 10px;
            color: white;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 16px 20px;
            margin-bottom: 10px;
        }

        .filter-bar select {
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-bar select:hover { border-color: #e50914; }

        /* Movie grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 10px 40px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movie-grid a {
            display: block;
            width: 100%;
            text-decoration: none;
        }

        .movie-card {
            width: 100%;
            height: auto;
            aspect-ratio: 2/3;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background: #1e1e1e;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .movie-card:hover { transform: scale(1.05); }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .movie-card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 30px 10px 10px;
            box-sizing: border-box;
        }

        .movie-card .overlay h3 {
            color: white;
            text-align: center;
            margin: 0;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .movie-card .no-poster {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #555;
        }

        /* Loader */
        #loader {
            text-align: center;
            padding: 30px;
            color: #e50914;
            font-size: 1rem;
            display: none;
        }

        .spinner-small {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid #333;
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #end-message {
            text-align: center;
            color: #555;
            padding: 30px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body style="background-color: #121212; color: white; font-family: Arial, sans-serif;">

    <nav class="navbar">
        <h1 class="logo">
            <a href="/frontend/home/index.html" style="color:red; text-decoration:none;">MovieBuddy</a>
        </h1>
        <div class="search-box">
            <input type="text" id="searchinput" placeholder="Search movies & shows...">
            <button id="searchbutton">Search</button>
        </div>
        <div class="nav-links">
            <a href="/frontend/home/index.html">Home</a>
            <a href="/frontend/movies/movies.html">Movies</a>
            <a href="/frontend/watchlist/watchlist.html">Watchlist</a>
            <a href="/frontend/for_you/foryou.html">For You</a>
            <a href="/frontend/match/matchmaker.html">Watch With Friend</a>
            <a href="/frontend/login_page/auth.html" id="nav-auth-btn" class="sign-in-btn">Sign In</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>Movies</h1>
    </div>

    <div class="filter-bar">
        <select id="genre-filter">
            <option value="">All Genres</option>
            <option value="28">Action</option>
            <option value="12">Adventure</option>
            <option value="16">Animation</option>
            <option value="35">Comedy</option>
            <option value="80">Crime</option>
            <option value="99">Documentary</option>
            <option value="18">Drama</option>
            <option value="14">Fantasy</option>
            <option value="27">Horror</option>
            <option value="9648">Mystery</option>
            <option value="10749">Romance</option>
            <option value="878">Science Fiction</option>
            <option value="53">Thriller</option>
        </select>

        <select id="sort-filter">
            <option value="popularity.desc">Most Popular</option>
            <option value="vote_average.desc">Top Rated</option>
            <option value="release_date.desc">Newest First</option>
            <option value="release_date.asc">Oldest First</option>
        </select>
    </div>

    <div id="movie-grid" class="movie-grid"></div>

    <div id="loader">
        <span class="spinner-small"></span> Loading more movies...
    </div>

    <div id="end-message">You've seen everything! 🎬</div>
    <script src="/frontend/home/config.js"></script>
    <script src="movies.js"></script>
</body>
</html>
